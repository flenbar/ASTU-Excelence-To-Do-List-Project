<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <div class="title">
           <h1>To-DO List</h1>
           <p>Stay organized and productive</p>
        </div>
        <div class="input-place">
           <input type="text" placeholder="Add a new task... ">
           <button>+ Add</button>
        </div>
        <div class="card-container">
           <div class="card" >
             <h2>2</h2>
             <p>Active</p>
           </div>
           <div class="card">
              <h2>1</h2>
              <p>Complete</p>
           </div>
           <div class="card">
              <h2>3</h2>
              <p>Total</p>
           </div>
        </div>
        <div class="status">
          <div class="status-task">
            <input type="checkbox">
            <span>Welcome to your to-do list</span>
          </div>
          <div class="status-task">
            <input type="checkbox">
            <span>Click the checkbox mark as to delete</span>
          </div>
          <div class="status-task">
            <input type="checkbox" checked>
            <span>Hover to delete items</span>
          </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
